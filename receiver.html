<!DOCTYPE html>
<html>
<head>
    <title>My Dashboard</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
</head>
<body style="background: #1a1a1a; color: white; text-align: center; font-family: Arial;">
    <h1>🔴 Live Monitoring Dashboard</h1>
    <p id="status">Connecting to Peer Server...</p>
    <video id="remoteVideo" autoplay playsinline style="width: 95%; max-width: 600px; border: 3px solid #00ff00;"></video>

    <script>
        // DHAYAN DEIN: Ye ID wahi honi chahiye jo index.html mein call ki gayi hai
        var myID = 'mera-unique-bhai-tracker'; 
        var peer = new Peer(myID); 

        peer.on('open', function(id) {
            document.getElementById('status').innerText = "Dashboard Online. Waiting for Bhai...";
        });

        peer.on('call', function(call) {
            document.getElementById('status').innerText = "Connected! Receiving Video...";
            call.answer(); 
            call.on('stream', function(remoteStream) {
                document.getElementById('remoteVideo').srcObject = remoteStream;
            });
        });
    </script>
</body>
</html>
